apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-processor-h3
  labels:
    app: user-processor-h3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-processor-h3
  template:
    metadata:
      labels:
        app: user-processor-h3
    spec:
      containers:
        - name: user-processor-h3
          image: rasmile/user-processor-h3:latest
          imagePullPolicy: Always
          env:
            - name: MYSQL_DSN
              value: "root:pass@tcp(mysql:3306)/uqar"
            - name: KAFKA_BROKER
              value: "kafka-0.kafka:9092"
            - name: KAFKA_INPUT_TOPIC
              value: "users"
            - name: KAFKA_OUTPUT_TOPIC
              value: "notification"
            - name: KAFKA_GROUP_ID
              value: "user-processor-h3-group"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: user-processor-h3-service
spec:
  selector:
    app: user-processor-h3
  ports:
  - port: 80
    targetPort: 8080